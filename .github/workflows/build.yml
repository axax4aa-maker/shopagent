name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk git zip unzip autoconf libtool pkg-config
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython
    
    - name: Setup Android SDK manually
      run: |
        # 下载命令行工具
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip commandlinetools-linux-9477386_latest.zip
        
        # 创建正确的目录结构
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
        mv cmdline-tools ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
        
        # 设置环境变量
        export ANDROID_SDK_ROOT=~/.buildozer/android/platform/android-sdk
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
        
        # 接受所有许可证（自动）
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
        
        # 安装稳定版 build-tools
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"
    
    - name: Build APK
      run: |
        # 直接使用 shop_ui_nobutton_v2.py 作为 main.py
        # 方式1：复制文件
        /bin/cp shop_ui_nobutton_v2.py main.py
        # 或者方式2：直接重命名
        # mv shop_ui_nobutton_v2.py main.py
        buildozer android debug
      env:
        ANDROID_SDK_ROOT: ~/.buildozer/android/platform/android-sdk
        PATH: ${{ env.PATH }}:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: shopagent-apk
        path: bin/*.apk
