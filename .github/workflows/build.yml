name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libffi-dev libsqlite3-dev
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython
    
    - name: Setup Android SDK licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        echo "count=0" > ~/.android/repositories.cfg
    
    - name: Build APK
      run: |
        cp shop_ui_nobutton_v2.py main.py
        buildozer android debug
      env:
        # 自动接受许可证
        ANDROID_SDK_HOME: /home/runner/.android
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
