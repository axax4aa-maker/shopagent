name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install Buildozer
      run: |
        pip install buildozer
        sudo apt update
        sudo apt install -y openjdk-17-jdk
    
    - name: Build APK
      run: |
        cp shop_ui_nobutton_v2.py main.py
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: shopagent-apk
        path: bin/*.apk
